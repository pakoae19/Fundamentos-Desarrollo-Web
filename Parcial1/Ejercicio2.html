<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ejercicio #2</title>
</head>
<body>

    <h1>Formulario</h1>

    <form action="" method="get">

        <p>
            Nombre:
            <input type="text" name="nombre" required>
        </p>

        <p>
            Correo electrónico:
            <input type="email" name="correo" required>
        </p>

        <p>
            URL:
            <input type="url" name="url" placeholder="Escribe la URL de tu página web personal">
        </p>

        <p>
            Fecha:
            <input type="date" name="fecha">
        </p>

        <p>
            Tiempo:
            <input type="time" name="tiempo">
        </p>

        <p>
            Fecha y hora:
            <input type="datetime" name="fechahora">
        </p>

        <p>
            Mes:
            <input type="month" name="mes">
        </p>

        <p>
            Semana:
            <input type="week" name="semana">
        </p>

        <p>
            Número (min -10, max 10):
            <input type="number" name="numero" min="-10" max="10">
        </p>

        <p>
            Teléfono:
            <input type="tel" name="telefono">
        </p>

        <p>
            Término de búsqueda:
            <input type="search" name="busqueda">
        </p>

        <p>
            Color favorito:
            <input type="color" name="color">
        </p>

        <p>
            <button type="submit">Enviar</button>
        </p>

    </form>

</body>
</html>
